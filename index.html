<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barua</title>
<style>
  :root {
    --bg: #1A1C1E;
    --card: #232629;
    --text: #E8E9EA;
    --muted: #8A8F94;
    --c1: #4A90D9;
    --c2: #E86A5C;
    --c3: #5CB85C;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', sans-serif;
  }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 48px 56px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  h1 {
    margin: 0 0 8px;
    font-size: 2.2rem;
  }
  p {
    margin: 0 0 24px;
    color: var(--muted);
  }
  .dots {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .dots span {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
    animation: pulse 1.6s ease-in-out infinite;
  }
  .dots span:nth-child(1) { background: var(--c1); animation-delay: 0s; }
  .dots span:nth-child(2) { background: var(--c2); animation-delay: 0.2s; }
  .dots span:nth-child(3) { background: var(--c3); animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.3); opacity: 1; }
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Habari, Barua! 👋</h1>
    <p>Hello world — the subdomain is alive. The unified inbox is coming soon.</p>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>
</body>
</html>
